                <img src="https://img2.pic.in.th/IMG_06965cb6b6f9c49059c8.jpeg" alt="Logo" class="w-24 h-24 mx-auto mb-6 rounded-full border-4 border-slate-50 shadow-md">

    <template x-if="view === 'student-report'">

                    <h2 class="text-2xl md:text-4xl font-bold text-blue-900 mb-2">ใบแจ้งผลการเรียนรายบุคคล</h2>
                    <p class="text-slate-400 font-medium uppercase tracking-widest">โรงเรียนนิคมลำนารายณ์ ปีการศึกษา 2568</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 bg-slate-50 p-8 rounded-[2rem] border-2 border-white shadow-inner">
                    <p class="text-lg text-blue-900"><strong>ชื่อ-สกุล:</strong> <span class="font-bold" x-text="targetStudent.name"></span></p>
                    <p class="text-lg text-blue-900"><strong>ชั้นเรียน:</strong> ประถมศึกษาปีที่ 6</p>
                    <p class="text-lg text-blue-900"><strong>รหัสประจำตัว:</strong> <span class="font-bold" x-text="targetStudent.id"></span></p>
                    <p class="text-lg text-blue-900"><strong>เลขที่:</strong> <span class="font-bold" x-text="targetStudent.no"></span></p>
                </div>

                <div class="overflow-x-auto mb-12 border rounded-[2rem] shadow-sm">
                    <table class="w-full text-center border-collapse">
                        <thead class="navy-bg text-white">
                            <tr>
                                <th class="p-4 text-left pl-8">รายวิชา</th>
                                <th class="p-4">คะแนนเก็บ</th>
                                <th class="p-4">คะแนนสอบ</th>
                                <th class="p-4">รวม</th>
                                <th class="p-4 pr-8">เกรด</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <template x-for="subj in subjects" :key="subj.key">
                                <tr class="hover:bg-blue-50/50 transition-colors">
                                    <td class="p-4 text-left pl-8 font-bold text-blue-900" x-text="subj.name"></td>
                                    <td class="p-4 text-slate-500" x-text="targetStudent.scores[subj.key].collect"></td>
                                    <td class="p-4 text-slate-500" x-text="targetStudent.scores[subj.key].exam"></td>
                                    <td class="p-4 font-bold text-slate-700" x-text="targetStudent.scores[subj.key].total"></td>
                                    <td class="p-4 pr-8 font-black text-blue-700 text-2xl" x-text="targetStudent.scores[subj.key].grade"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center p-10 navy-bg rounded-[2.5rem] text-white shadow-2xl">
                    <div class="text-center md:text-left">
                        <p class="text-blue-300 font-bold mb-1 uppercase tracking-widest text-sm opacity-80">เกรดเฉลี่ยสะสม (GPA)</p>
                        <span class="text-7xl font-black" x-text="calculateGPA(targetStudent)"></span>
                    </div>
                    <div class="text-center md:text-right flex flex-col items-center md:items-end">
                        <p class="text-blue-200 text-sm mb-3 opacity-80">ผลการประเมินสถานะ</p>
                        <span :class="parseFloat(calculateGPA(targetStudent)) >= 1 ? 'bg-green-500 shadow-green-900/20' : 'bg-red-500 shadow-red-900/20'" 
                              class="px-12 py-4 rounded-2xl font-black text-2xl shadow-xl border-2 border-white/20" 
                              x-text="parseFloat(calculateGPA(targetStudent)) >= 1 ? '✅ ผ่านเกณฑ์' : '❌ ไม่ผ่านเกณฑ์'">
                        </span>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 mt-12 no-print">
                    <button onclick="window.print()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200">🖨️ พิมพ์ผลการเรียน (PDF)</button>
                    <button @click="view = 'home'" class="flex-1 navy-bg text-white py-4 rounded-2xl font-bold hover:bg-blue-800 shadow-lg">🚪 ออกจากระบบ</button>
                </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEBjCcd8-RxkuzqyJ6c3BdcknRyMjyE08",
            authDomain: "thayidaclass.firebaseapp.com",
            projectId: "thayidaclass",
            storageBucket: "thayidaclass.firebasestorage.app",
            messagingSenderId: "767577042640",
            appId: "1:767577042640:web:839d4248fa05673729f8d5",
            measurementId: "G-3M5EED3WK1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fb = { collection, addDoc, getDocs, deleteDoc, doc, setDoc };

        const auth = getAuth(app);
        window.auth = auth;
        window.authFns = { signInWithEmailAndPassword, onAuthStateChanged, signOut };

    </script>
    
    <script>
        function gradeSystem() {
            return {
                view: 'home',
                auth: { user: '', pass: '' },
                searchId: '',
                showModal: false,
                students: [],
                currentStudent: null,
                targetStudent: null,
                subjects: [
                    { name: 'ภาษาไทย', key: 'th' },
                    { name: 'คณิตศาสตร์', key: 'math' },
                    { name: 'วิทยาศาสตร์', key: 'sci' },
                    { name: 'ภาษาอังกฤษ', key: 'en' },
                    { name: 'สังคมศึกษา', key: 'soc' },
                    { name: 'ประวัติศาสตร์', key: 'hist' },
                    { name: 'การงานอาชีพ', key: 'job' },
                    { name: 'ศิลปะ', key: 'art' },
                    { name: 'สุขศึกษาและพลศึกษา', key: 'pe' },
                    { name: 'หน้าที่พลเมือง', key: 'civic' }
                ],

                init() {
                    authFns.onAuthStateChanged(auth, (user) => {
                        if (user) {
                            this.view = 'teacher-dashboard';
                        }
                    });

                    this.loadStudents();
                },

                async loginTeacher() {
                    try {
                        const email = this.auth.user + "@lnr.com";

                        await authFns.signInWithEmailAndPassword(
                            auth,
                            email,
                            this.auth.pass
                        );

                        this.view = 'teacher-dashboard';

                    } catch (e) {
                        alert('❌ Username หรือ Password ไม่ถูกต้อง');
                        console.error(e);
                    }
                },

                loginStudent() {
                    const found = this.students.find(s => s.id === this.searchId);
                    if(found) {
                        this.targetStudent = found;
                        this.view = 'student-report';
                    } else {
                        alert('❌ ไม่พบข้อมูล: กรุณาตรวจสอบรหัสประจำตัวนักเรียนอีกครั้ง');
                    }
                },

                openModal(mode) {
                    let baseScores = {};
                    this.subjects.forEach(s => baseScores[s.key] = { collect: 0, exam: 0, total: 0, grade: '0' });
                    this.currentStudent = { no: this.students.length + 1, id: '', name: '', class: 'ป.6', scores: baseScores };
                    this.showModal = true;
                },

                editGrades(st) {
                    this.currentStudent = JSON.parse(JSON.stringify(st));
                    this.showModal = true;
                },

                calc(key) {
                    let s = this.currentStudent.scores[key];
                    s.total = (Number(s.collect) || 0) + (Number(s.exam) || 0);
                    const t = s.total;
                    if (t >= 80) s.grade = '4';
                    else if (t >= 75) s.grade = '3.5';
                    else if (t >= 70) s.grade = '3';
                    else if (t >= 65) s.grade = '2.5';
                    else if (t >= 60) s.grade = '2';
                    else if (t >= 55) s.grade = '1.5';
                    else if (t >= 50) s.grade = '1';
                    else s.grade = '0';
                },

                async save() {
                    if(!this.currentStudent.id || !this.currentStudent.name) {
                        return alert('กรุณากรอกรหัสประจำตัวและชื่อ-นามสกุล');
                    }

                    try {

                        let docId = this.currentStudent._docId || this.currentStudent.id;

                        const docRef = fb.doc(db, "students", docId);

                        let cleanData = {...this.currentStudent};
                        delete cleanData._docId;

                        await fb.setDoc(docRef, cleanData);

                        await this.loadStudents();

                        this.showModal = false;

                        alert("บันทึกข้อมูลเรียบร้อยแล้ว");

                    } catch(e) {
                        alert("เกิดข้อผิดพลาดในการบันทึก");
                        console.error(e);
                    }
                },

                async deleteStudent(idx) {
                    const student = this.students[idx];

                    if(confirm('คุณครูแน่ใจใช่ไหมที่จะลบข้อมูลนักเรียนรายนี้?')) {

                        await fb.deleteDoc(fb.doc(db, "students", student._docId));

                        await this.loadStudents();
                    }
                },

                calculateGPA(st) {
                    let sum = 0;
                    this.subjects.forEach(s => {
                        sum += parseFloat(st.scores?.[s.key]?.grade || 0);
                    });
                    return (sum / this.subjects.length).toFixed(2);
                },

                async logout() {
                    await authFns.signOut(auth);
                    this.view = 'home';
                    this.auth = { user: '', pass: '' };
                },

                async loadStudents() {
                    const querySnapshot = await fb.getDocs(fb.collection(db, "students"));
                    this.students = [];
                    querySnapshot.forEach((docSnap) => {
                        let data = docSnap.data();

                        if (!data.scores) {
                            data.scores = {};
                        }

                        this.subjects.forEach(s => {
                            if (!data.scores[s.key]) {
                                data.scores[s.key] = { collect: 0, exam: 0, total: 0, grade: "0" };
                            }
                        });

                        data._docId = docSnap.id;
                        this.students.push(data);
                    });
                    this.students.sort((a,b) => a.no - b.no);
                },
            }
        }
    </script>
